name: Deploy release

on:
  release:
    types:
      - published

jobs:
  deploy:
    uses: croct-tech/shared-public-configs/.github/workflows/publish-public-npm-package.yml@master
    with:
      prepare-script: >-
        cp LICENSE README.md package.json build/ &&
        cd build &&
        find . -type f -path '*/*\.js.map' -exec sed -i -e "s~../src~src~" {} + &&
        tmp=$(mktemp) &&
        jq --arg version "$GITHUB_REF_NAME" '
          .version = $version |
          walk(
            if type == "string"
            then gsub("\\./build"; ".") | gsub("\\./src"; ".")
            else .
            end
          )
        ' package.json > "$tmp" &&
        mv "$tmp" package.json
